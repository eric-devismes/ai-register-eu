name: i18n translation gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify translations
        run: node scripts/i18n-check.js
